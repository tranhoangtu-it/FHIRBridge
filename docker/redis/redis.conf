# FHIRBridge Redis Configuration
# Used for rate limiting and job queues only — no PHI stored.

# --- Memory Management ---
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# --- Persistence (minimal — data is ephemeral by design) ---
save 900 1
save 300 10
save 60 10000

# --- Networking ---
bind 0.0.0.0
protected-mode no
tcp-backlog 511
timeout 300
tcp-keepalive 60

# --- General ---
loglevel notice
databases 16
always-show-logo no

# --- Slow Log ---
slowlog-log-slower-than 10000
slowlog-max-len 128

# --- Append Only File ---
appendonly no

# --- Limits ---
maxclients 100
